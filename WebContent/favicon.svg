<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Ayora">
	<defs>
		<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0%" stop-color="#8B1A2B"/>
			<stop offset="100%" stop-color="#5C0E1B"/>
		</linearGradient>
		<linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
			<stop offset="0%" stop-color="#E8C879"/>
			<stop offset="100%" stop-color="#B8922F"/>
		</linearGradient>
	</defs>
	<!-- Fond bordeaux profond, coins legerement arrondis -->
	<rect width="64" height="64" rx="10" fill="url(#bg)"/>
	<!-- Filets dores fins en haut/bas pour effet monogramme maison de luxe -->
	<rect x="14" y="13" width="36" height="0.9" fill="url(#gold)" opacity="0.85"/>
	<rect x="14" y="50.1" width="36" height="0.9" fill="url(#gold)" opacity="0.85"/>
	<!-- Lettre A serif elegante, doree, centree -->
	<text x="32" y="44"
		font-family="Georgia, 'Times New Roman', serif"
		font-size="38"
		font-weight="400"
		fill="url(#gold)"
		text-anchor="middle">A</text>
</svg>
