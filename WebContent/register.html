<!DOCTYPE html>
<html lang="fr">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Ayora - Inscription</title>
	<link rel="stylesheet" href="css/styles.css?v=26">
</head>
<body>

	<div class="menu-bar">
		<div class="logo" onclick="location.href='index.html'">Ayora<span>.ma</span></div>
		<nav>
			<span onclick="location.href='login.html'">Connexion</span>
			<span class="active">Inscription</span>
		</nav>
	</div>

	<div class="auth-container">
		<div class="auth-box">
			<h2>Créer votre compte</h2>
			<p class="subtitle">Rejoignez Ayora et planifiez votre mariage de rêve</p>

			<div id="errorMsg" class="error-message"></div>

			<form id="registerForm" onsubmit="handleRegister(event)">
				<div class="form-row">
					<div class="form-group">
						<label for="firstName">Prénom</label>
						<input type="text" id="firstName" placeholder="Votre prénom" required>
					</div>
					<div class="form-group">
						<label for="lastName">Nom</label>
						<input type="text" id="lastName" placeholder="Votre nom" required>
					</div>
				</div>
				<div class="form-group">
					<label for="email">Adresse e-mail</label>
					<input type="email" id="email" placeholder="votre@email.com" required>
				</div>
				<div class="form-group">
					<label for="phone">Téléphone</label>
					<input type="tel" id="phone" placeholder="06XX-XXXXXX">
				</div>
				<div class="form-group">
					<label for="password">Mot de passe</label>
					<input type="password" id="password" placeholder="Minimum 6 caractères" required minlength="6">
				</div>
				<div class="form-group">
					<label for="confirmPassword">Confirmer le mot de passe</label>
					<input type="password" id="confirmPassword" placeholder="Retapez votre mot de passe" required>
				</div>
				<button type="submit" class="btn btn-primary">Créer mon compte</button>
			</form>

			<p class="link-text">
				Déjà un compte ? <a href="login.html">Se connecter</a>
			</p>
		</div>
	</div>

	<script src="js/api.js"></script>
	<script>
		function handleRegister(event) {
			event.preventDefault();
			var errorMsg = document.getElementById('errorMsg');
			errorMsg.style.display = 'none';

			var password = document.getElementById('password').value;
			var confirmPassword = document.getElementById('confirmPassword').value;

			if (password !== confirmPassword) {
				errorMsg.textContent = 'Les mots de passe ne correspondent pas';
				errorMsg.style.display = 'block';
				return;
			}

			var data = {
				firstName: document.getElementById('firstName').value,
				lastName: document.getElementById('lastName').value,
				email: document.getElementById('email').value,
				phone: document.getElementById('phone').value,
				password: password
			};

			api.post('/api/auth/register', data)
				.then(function(result) {
					if (result.success) {
						localStorage.setItem('user', JSON.stringify(result.user));
						location.href = 'questionnaire.html';
					} else {
						errorMsg.textContent = result.error || 'Erreur lors de l\'inscription';
						errorMsg.style.display = 'block';
					}
				})
				.catch(function(err) {
					errorMsg.textContent = 'Erreur de connexion au serveur';
					errorMsg.style.display = 'block';
				});
		}
	</script>
</body>
</html>
